apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/nosenadayo/challenge_talana_frontend:latest
        ports:
        - containerPort: 80
        env:
        - name: VUE_APP_API_URL
          value: http://backend-service:3000